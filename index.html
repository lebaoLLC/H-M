<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H&M | AI Stylist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --hm-red:#e50010;
  --ink:#111111;
  --ink-soft:#5a5a5a;
  --line:#e2e2e2;
  --line-soft:#eeeeee;
  --bg:#fafafa;
  --grey-bg:#f5f5f5;
  --green:#1a7d3a;
  --radius:6px;
  --sans: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;}
body{font-family:var(--sans);font-weight:400;color:var(--ink);background:var(--bg);font-size:14px;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;background:none;border:none;color:inherit;font-size:inherit;-webkit-tap-highlight-color:transparent;}
button:disabled{cursor:not-allowed;}
/* Universal press feedback: every clickable control (real <button> and
   role="button" custom elements) gets a consistent, subtle press state
   on top of whatever hover state it already defines, so clicking
   anywhere in the app feels tactile rather than static. */
button:not(:disabled):active,
[role="button"]:not([aria-disabled="true"]):active{transform:scale(.97);}
.btn-primary:not(:disabled):active{background:#000;transform:scale(.97);}
.btn-outline:not(:disabled):active{background:var(--ink);color:#fff;transform:scale(.97);}
.btn-sm-outline:active,.btn-sm-dark:active{transform:scale(.96);}
.checkout-btn:active{background:#a80009;transform:scale(.98);}
.view-bag-btn:active{background:var(--grey-bg);transform:scale(.98);}
.full-btn:not(.loading):active{background:#000;transform:scale(.98);}
.btn-quiz-continue:not(:disabled):active{background:#000;transform:scale(.98);}
.btn-quiz-skip:active{background:var(--grey-bg);}
.fab:active{transform:translateY(0) scale(.97);}
.cat-card:active .placeholder-img{opacity:.7;}
.mood-card:active,.swatch-item:active,.swap-thumb:active,.side-reco-card:active{transform:scale(.985);}
.qty-row button:active{background:var(--grey-bg);}
.header-icons button:active{color:var(--hm-red);}
input{font-family:inherit;}
a{color:inherit;text-decoration:none;}
ul{margin:0;padding:0;list-style:none;}
.visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;}
h1,h2,h3,h4,h5,h6{font-weight:500;}
[role="button"]{cursor:pointer;}
:focus-visible{outline:1px solid var(--ink);outline-offset:2px;}

/* Icon sizing — svg has no intrinsic box, so every rendered icon needs an
   explicit width/height or it falls back to the browser default (300x150). */
.icon{width:19px;height:19px;flex:0 0 auto;display:inline-block;vertical-align:middle;}
.icon-2xs{width:10px;height:10px;}
.icon-xs{width:13px;height:13px;}
.icon-sm{width:15px;height:15px;}
.icon-md{width:20px;height:20px;}
.icon-lg{width:26px;height:26px;}
.icon-xl{width:34px;height:34px;}

.app{display:flex;flex-direction:row;position:fixed;inset:0;overflow:hidden;}
.main-col{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;height:100%;min-height:0;}
.main-col-chrome{flex:0 0 auto;}
.main-col-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.main-col-scroll::-webkit-scrollbar{width:6px;}
.main-col-scroll::-webkit-scrollbar-track{background:transparent;}
.main-col-scroll::-webkit-scrollbar-thumb{background:#d8d8d8;border-radius:3px;}
.main-col-scroll::-webkit-scrollbar-thumb:hover{background:#bbb;}
.main-col-scroll{scrollbar-width:thin;scrollbar-color:#d8d8d8 transparent;}
header.main-header{padding:0 32px;background:#fff;z-index:30;box-shadow:0 1px 0 var(--line-soft);}
.logo-btn{display:flex;align-items:center;}
.logo{font-family:Georgia,serif;font-weight:700;font-style:italic;font-size:38px;color:var(--hm-red);letter-spacing:-1px;line-height:1;transform:scaleY(1.1);}
.logo-img{height:34px;max-height:34px;width:auto;object-fit:contain;display:block;}
.header-icons{display:flex;align-items:center;gap:20px;font-size:13.5px;}
.header-icons button{display:flex;flex-direction:row;align-items:center;gap:7px;position:relative;color:var(--ink);}
.header-icons button:hover{color:var(--hm-red);}
.header-icons button:hover .icon{color:var(--hm-red);}
.bag-count{position:absolute;top:-6px;right:-10px;background:var(--hm-red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;}
nav.main-nav-single{display:flex;justify-content:space-between;align-items:center;padding:16px 0;gap:24px;margin-top:0;}
.nav-left{display:flex;align-items:center;gap:34px;flex:0 0 auto;}
.nav-links{display:flex;gap:26px;font-size:13.5px;align-items:center;flex:0 0 auto;}
.nav-right{display:flex;align-items:center;gap:24px;flex:0 0 auto;}
.nav-links a{padding:0;display:inline-block;border-bottom:2px solid transparent;}
.nav-links a{transition:color .12s ease;}
.nav-links a:hover{color:var(--hm-red);}
.nav-links a:active{color:#a80009;}
.nav-links a.sale{color:var(--hm-red);font-weight:400;}
.nav-links a.active{border-bottom-color:var(--ink);font-weight:600;}
.search-box{display:flex;align-items:center;gap:8px;border:none;border-bottom:1px solid var(--line);border-radius:0;padding:8px 2px;width:200px;color:var(--ink-soft);}
.search-box input{border:none;outline:none;font-size:13px;width:100%;background:none;}
.search-box input::placeholder{color:#8a8a8a;}

/* Search overlay */
.search-overlay{position:fixed;inset:0;background:rgba(255,255,255,.98);z-index:70;display:flex;flex-direction:column;align-items:center;padding-top:120px;opacity:0;pointer-events:none;transition:opacity .16s ease;}
.search-overlay.open{opacity:1;pointer-events:auto;}
.search-overlay-inner{width:100%;max-width:640px;padding:0 24px;position:relative;}
.search-overlay-close{position:absolute;top:-70px;right:0;}
.search-overlay input{width:100%;border:none;border-bottom:2px solid var(--ink);font-family:Georgia,serif;font-size:28px;padding:8px 0;outline:none;}
.search-suggest{margin-top:22px;font-size:12px;color:var(--ink-soft);}
.search-suggest .row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line-soft);cursor:pointer;}
.search-suggest .row:hover{color:var(--ink);}

/* Account dropdown */
.account-pop{position:absolute;top:calc(100% + 14px);right:0;background:#fff;border:1px solid var(--line-soft);box-shadow:0 10px 28px rgba(0,0,0,.12);width:240px;padding:18px;z-index:35;}
.account-pop h5{margin:0 0 4px;font-size:13px;}
.account-pop p{margin:0 0 12px;font-size:11.5px;color:var(--ink-soft);line-height:1.5;}
.account-pop a{display:block;padding:8px 0;font-size:12.5px;border-top:1px solid var(--line-soft);}
.account-pop a:hover{color:var(--hm-red);}

/* Toast */
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:24px;font-size:12.5px;display:flex;align-items:center;gap:8px;z-index:90;opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;box-shadow:0 8px 24px rgba(0,0,0,.25);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.main-content{max-width:1440px;margin:0 auto;width:100%;padding-bottom:16px;}

.placeholder-img{border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center;color:#9a9a9a;font-size:10px;text-align:center;padding:6px;overflow:hidden;position:relative;border-radius:var(--radius);}
.placeholder-img.placeholder-empty{background:repeating-linear-gradient(135deg,#f2f2f2,#f2f2f2 10px,#e9e9e9 10px,#e9e9e9 20px);}
.placeholder-img span{word-break:break-word;}
.placeholder-img img.real-img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}

.hero{position:relative;margin:16px 32px 0;height:432px;}
.hero .placeholder-img{width:100%;height:100%;}
.hero-copy{position:absolute;left:44px;top:50%;transform:translateY(-50%);color:var(--ink);max-width:330px;}
.hero-copy h1{font-family:Georgia,serif;font-size:37px;line-height:1.18;margin:0 0 14px;font-weight:400;}
.hero-copy p{margin:0 0 20px;font-size:13.5px;color:#444;line-height:1.55;}
.btn-primary{background:var(--ink);color:#fff;border:1px solid var(--ink);border-radius:var(--radius);padding:14px 28px;font-size:13px;font-weight:500;letter-spacing:.3px;transition:background .15s ease,transform .1s ease;}
.btn-primary:hover{background:#000;}
.btn-outline{background:#fff;color:var(--ink);border:1px solid var(--ink);border-radius:var(--radius);padding:14px 28px;font-size:13px;transition:background .15s ease,color .15s ease,transform .1s ease;}
.btn-outline:hover{background:var(--ink);color:#fff;}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:24px 32px 0;}
.cat-card{cursor:pointer;}
.cat-card .placeholder-img{height:288px;width:100%;transition:opacity .15s ease;}
.cat-card:hover .placeholder-img{opacity:.85;}
.cat-card h4{margin:12px 0 2px;font-size:14.5px;font-weight:700;}
.cat-card p{margin:0;font-size:12px;color:var(--ink-soft);}
.section-divider{border:none;border-top:1px solid var(--line-soft);margin:40px 32px;}
.promo-strip{display:flex;justify-content:space-between;align-items:center;margin:0 32px;padding:14px 0;border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);font-size:12px;color:var(--ink-soft);}
.promo-strip .item{display:flex;align-items:center;gap:8px;}

/* Trust-badge footer strip — shown at the bottom of Results / Detail /
   PDP / Try-on-result pages (matches every reference screenshot except
   the plain home page, which deliberately omits it to fit one viewport). */
.pdp-secondary-btns{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.pdp-secondary-btns .btn-outline{display:flex;align-items:center;justify-content:center;gap:8px;}
.pdp-model-note{font-size:10.5px;color:var(--ink-soft);margin:8px 0 0;}
.trust-footer{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;margin:0 32px;padding:18px 0;border-top:1px solid var(--line-soft);font-size:12.5px;color:var(--ink-soft);}
.trust-footer .tf-item{display:flex;align-items:flex-start;gap:9px;}
.trust-footer .tf-item .icon{margin-top:2px;color:#777;flex:0 0 auto;}
.trust-footer .tf-item a{text-decoration:none;color:var(--ink-soft);}
.trust-footer .tf-item a:hover{color:var(--hm-red);}
.trust-footer .tf-item > div{line-height:1.6;min-height:2.8em;display:flex;flex-direction:column;justify-content:center;}

.fab{position:fixed;right:26px;bottom:26px;background:#fff;color:var(--ink);border:1px solid var(--line-soft);border-radius:30px;padding:14px 20px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;box-shadow:0 8px 22px rgba(0,0,0,.14);z-index:40;transition:transform .15s ease, opacity .15s ease, box-shadow .15s ease;}
.fab:hover{box-shadow:0 10px 26px rgba(0,0,0,.18);}
.fab:hover{transform:translateY(-2px);}
.fab.hidden{opacity:0;pointer-events:none;transform:translateY(10px);}
.fab .sparkle{color:var(--ink);}

.panel-overlay{display:none;}
.stylist-dock{flex:0 0 0;width:0;height:100%;overflow:hidden;transition:width .24s cubic-bezier(.4,0,.2,1);z-index:20;}
.stylist-dock.open{flex-basis:400px;width:400px;}
.stylist-panel{position:relative;width:400px;max-width:400px;height:100%;background:#fff;border-left:1px solid var(--line-soft);box-shadow:-2px 0 14px rgba(0,0,0,.05);z-index:20;display:flex;flex-direction:column;}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line-soft);gap:10px;}
.panel-header .ph-left{display:flex;align-items:center;gap:10px;}
.panel-header h3{font-size:14px;margin:0;font-weight:700;}
.panel-header .sub{font-size:11px;color:var(--ink-soft);}
.panel-header button{padding:6px;display:flex;}
.panel-body{flex:1;overflow-y:auto;padding:16px 18px;}
.panel-intro-text{font-size:13px;color:var(--ink-soft);line-height:1.6;margin:0 0 14px;}
.clear-card{display:flex;align-items:flex-start;gap:10px;border:1px solid var(--line-soft);border-radius:6px;padding:10px 12px;margin-bottom:8px;}
.clear-badge{width:24px;height:24px;border-radius:50%;background:var(--ink);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.clear-text h4{margin:0 0 2px;font-size:12.5px;}
.clear-text p{margin:0;font-size:11.5px;color:var(--ink-soft);line-height:1.4;}
.clear-icon{margin-left:auto;color:#bbb;flex:0 0 auto;}
.example-box{background:var(--grey-bg);border-radius:6px;padding:12px;font-size:11.5px;color:var(--ink-soft);line-height:1.6;margin-top:10px;}
.example-box b{color:var(--ink);}

.panel-input-row{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--line-soft);}
.panel-input-row input{flex:1;border:1px solid var(--line);border-radius:20px;padding:12px 16px;font-size:13px;outline:none;}
.panel-input-row input:focus{border-color:var(--ink);}
.panel-input-row input::placeholder{font-size:12px;}
.panel-send-btn{width:38px;height:38px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto;padding:0;}
.panel-send-btn .icon{color:#fff;stroke:#fff;}
.panel-send-btn:disabled{opacity:.35;cursor:default;}

.chat-thread{display:flex;flex-direction:column;gap:12px;}
.msg-row{display:flex;gap:8px;max-width:100%;}
.msg-row.user{justify-content:flex-end;}
.msg-avatar{width:24px;height:24px;border-radius:50%;background:var(--grey-bg);border:1px solid var(--line);color:var(--hm-red);font-family:Georgia,serif;font-style:italic;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.msg-bubble{background:var(--grey-bg);border-radius:12px;padding:10px 13px;font-size:12.5px;line-height:1.55;max-width:82%;}
.msg-row.user .msg-bubble{background:var(--ink);color:#fff;}
.msg-row.bot .msg-content{max-width:100%;flex:1;}
.typing-dots{display:inline-flex;gap:3px;}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:#9a9a9a;animation:blink 1.1s infinite ease-in-out;}
.typing-dots span:nth-child(2){animation-delay:.18s;}
.typing-dots span:nth-child(3){animation-delay:.36s;}
@keyframes blink{0%,80%,100%{opacity:.25;}40%{opacity:1;}}

.chip-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:6px 0 2px 32px;}
.chip{background:none;border:none;border-radius:0;padding:4px 0;font-size:10.5px;color:var(--ink-soft);display:inline-flex;align-items:center;gap:6px;}
.chip .icon{color:#bbb;}

.section-label{font-size:11.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;margin:14px 0 8px;}
.mood-card-list{display:flex;flex-direction:column;gap:8px;}
.mood-card{position:relative;border:1px solid var(--line);border-radius:8px;padding:10px;display:flex;gap:10px;align-items:center;text-align:left;width:100%;transition:border-color .12s ease, background .12s ease, transform .1s ease;}
.mood-card:hover{border-color:#bbb;}
.mood-card .placeholder-img{width:52px;height:52px;flex:0 0 auto;border-radius:4px;}
.mood-card .mc-text h5{margin:0 0 2px;font-size:12.5px;}
.mood-card .mc-text p{margin:0;font-size:11px;color:var(--ink-soft);}
.mood-card .mc-check{position:absolute;top:10px;right:10px;width:18px;height:18px;background:var(--ink);border:1.5px solid #fff;box-shadow:0 0 0 1px var(--line);border-radius:50%;flex:0 0 auto;display:none;align-items:center;justify-content:center;color:#fff;}
.mood-card[aria-pressed="true"]{border-color:var(--ink);background:#fafafa;}
.mood-card[aria-pressed="true"] .mc-check{display:flex;}

.swatch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px;}
.swatch-grid.colors{grid-template-columns:repeat(3,1fr);}
.swatch-item{border:1px solid var(--line-soft);border-radius:8px;padding:12px 4px 10px;text-align:center;font-size:10.5px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:6px;position:relative;transition:border-color .12s ease,background .12s ease,transform .1s ease;min-height:82px;}
.swatch-item:hover{border-color:#bbb;}
.swatch-item[aria-pressed="true"]{border-color:var(--ink);background:#fafafa;box-shadow:0 0 0 1px var(--ink);}
.swatch-item .icon{color:#666;}
.swatch-item .sw-check{position:absolute;top:5px;right:5px;width:14px;height:14px;border-radius:50%;background:var(--ink);color:#fff;display:none;align-items:center;justify-content:center;}
.swatch-item[aria-pressed="true"] .sw-check{display:flex;}
.body-shape-grid{grid-template-columns:repeat(3,1fr);}
.body-shape-item{min-height:auto;padding:6px 6px 8px;gap:6px;}
.body-shape-img{width:100%;aspect-ratio:3/4;border-radius:4px;font-size:9px;}
.color-dots{display:flex;gap:3px;}
.color-dots i{width:12px;height:12px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,.08);}
.hint-text{font-size:10.5px;color:var(--ink-soft);display:flex;gap:5px;align-items:flex-start;line-height:1.5;margin:6px 0 4px;font-style:italic;}

.quiz-continue-wrap{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
.btn-quiz-continue{background:var(--ink);color:#fff;border-radius:20px;padding:11px;font-size:12.5px;font-weight:600;text-align:center;transition:background .15s ease,transform .1s ease;}
.btn-quiz-continue:disabled{opacity:.35;cursor:default;}
.btn-quiz-skip{background:#fff;color:var(--ink-soft);border:1px solid var(--line);border-radius:20px;padding:10px;font-size:12px;text-align:center;}

.brief-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.brief-header-row h4{margin:0;font-size:14px;}
.brief-edit-btn{font-size:11px;text-decoration:none;}
.style-brief-chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}

.page-title-row{padding:10px 32px 2px;}
.page-title-row h2{font-family:Georgia,serif;font-size:22px;margin:0 0 4px;}
.page-title-row p{margin:0;font-size:12.5px;color:var(--ink-soft);}

.looks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;padding:12px 32px 16px;align-items:stretch;}
.look-card{border:1px solid var(--line-soft);position:relative;display:flex;flex-direction:column;transition:box-shadow .15s ease;height:100%;}
.look-card:hover{box-shadow:0 6px 18px rgba(0,0,0,.08);}
.badge{position:absolute;top:10px;left:10px;background:#222222;color:#fff;font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:4px 9px;border-radius:12px;z-index:2;}
.look-card .placeholder-img{height:250px;width:100%;}
.look-info{padding:14px;display:flex;flex-direction:column;flex:1 1 auto;}
.name-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.name-row h3{font-size:14px;margin:0;}
.price{font-size:13px;font-weight:600;}
.tagline{font-size:11.5px;color:var(--ink-soft);margin:4px 0 8px;}
.match-toggle{font-size:11.5px;font-weight:600;display:flex;align-items:center;gap:5px;padding:0;margin-bottom:4px;border-radius:2px;}
.match-toggle svg{transition:transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);}
.match-toggle[aria-expanded="true"] svg{transform:rotate(180deg);}
.match-toggle:hover{color:var(--hm-red);}
.match-toggle:hover svg{color:var(--hm-red);}

.heart{position:absolute;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.12);transition:background .12s ease,transform .1s ease;}
.heart:hover{background:#fff;}
.heart:active{transform:scale(.92);}

.upload-zone:hover{border-color:#999;background:#fafafa;}
.upload-zone:active{background:var(--grey-bg);}

.compare-arrow{transition:box-shadow .12s ease,transform .1s ease;}
.compare-arrow:hover{box-shadow:0 4px 14px rgba(0,0,0,.18);}
.compare-arrow:active{transform:translate(-50%,-50%) scale(.92);}
.match-list{display:none;font-size:11px;color:var(--ink-soft);margin:0 0 8px;padding:0;}
.match-list.show{display:block;}
.match-list li{display:flex;align-items:center;gap:6px;padding:2px 0;}
.match-list li .icon{color:var(--ink);flex:0 0 auto;}
.look-thumbs{display:flex;gap:8px;margin:10px 0 6px;}
.look-thumbs .placeholder-img{width:100%;height:96px;flex:1;border-radius:2px;}
.look-thumbs .placeholder-img img.real-img{object-fit:contain;background:#fff;}
.look-btn-row{display:flex;gap:8px;margin-top:10px;}
.look-bottom{margin-top:auto;}
.btn-sm-outline,.btn-sm-dark{flex:1;padding:9px 4px;font-size:11px;text-align:center;border-radius:2px;transition:background .12s ease,color .12s ease,transform .1s ease;}
.btn-sm-outline{border:1px solid var(--ink);}
.btn-sm-outline:hover{background:var(--ink);color:#fff;}

     freeform chat input.

     queue (queueBotStep) with tracked timer ids, so fast user actions can

   --------------------------------------------------------------------- */
function h(tag, props, ...children){
  const el = document.createElement(tag);
  props = props || {};
  for(const key of Object.keys(props)){
    const val = props[key];
    if(val === null || val === undefined || val === false) continue;
    if(key === "class"){ el.className = val; }
    else if(key === "style" && typeof val === "object"){ Object.assign(el.style, val); }

  for(const c of flat){
    if(c === null || c === undefined || c === false) continue;
    el.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  }
  return el;
}

function Placeholder(path, className){
  const looksLikeFile = /\.(jpe?g|png|webp|gif|avif)(\?.*)?$/i.test(path || "");
  const wrap = h("div", {class: "placeholder-img " + (className||""), title: path});
  if(looksLikeFile){
    const fileLabel = path.split("/").pop();
    const img = h("img", {src: path, alt: fileLabel, loading:"lazy", class:"real-img"});
    img.addEventListener("error", () => {
      img.remove();
      wrap.classList.add("placeholder-empty");
      wrap.appendChild(h("span", null, fileLabel));
    }, {once:true});
    wrap.appendChild(img);
  } else {
    wrap.classList.add("placeholder-empty");
    wrap.appendChild(h("span", null, path));
  }
  return wrap;
}

function reducer(state, action){
  switch(action.type){
    case "NAV_HOME":
      return {...state, page:"home", bagOpen:false, panelOpen:false};
    case "NAV_RESULTS":
      return {...state, page:"results"};
    case "NAV_DETAIL":
      return {...state, page:"detail", currentLookId:action.lookId, swapSelectedIdx:1, updatedBanner:false, detailChat:[]};
    case "NAV_PDP":
      return {...state, page:"pdp", currentLookId:action.lookId};
    case "NAV_TRYON_RESULT":
      return {...state, page:"tryonResult", panelOpen:false};

    case "OPEN_PANEL":
      return {...state, panelOpen:true};
    case "CLOSE_PANEL":
      return {...state, panelOpen:false};
    case "SET_PANEL_STAGE":
      return {...state, panelStage:action.stage};

    case "CHAT_RESET":
      return {...state, chat: []};
    case "CHAT_ADD":
      return {...state, chat: [...state.chat, action.message]};
    case "CHAT_REMOVE_TYPING":
      return {...state, chat: state.chat.filter(m => m.type !== "typing")};
    case "DETAIL_CHAT_ADD":
      return {...state, detailChat: [...state.detailChat, action.message]};

    case "SELECT_VISUAL":
      return {...state, selectedVisual: action.idx};
    case "SET_BODY_SHAPE":
      return {...state, bodyShape: action.idx};
    case "SET_COLOR_DIR":
      return {...state, colorDir: action.idx};

    case "SET_SWAP_IDX":
      return {...state, swapSelectedIdx: action.idx};
    case "SHOW_UPDATED_BANNER":
      return {...state, updatedBanner: true};

    case "ADD_LOOK_TO_BAG": {
      // Fixed cart logic: merge into the existing bag by product id instead
      // of replacing it. If the product is already present, bump qty; only
      // truly new products get pushed as new rows.
      const bag = state.bag.map(row => ({...row}));
      action.items.forEach(item => {
        const existing = bag.find(row => row.id === item.id);
        if(existing){ existing.qty += 1; }
        else { bag.push({...item, qty:1}); }
      });
      return {...state, bag, justAddedToBag:true, bagOpen:true, panelOpen:false};
    }
    case "SET_ITEM_QTY": {
      const bag = state.bag
        .map(row => row.id === action.id ? {...row, qty:action.qty} : row)
        .filter(row => row.qty > 0);
      return {...state, bag};
    }
    case "OPEN_BAG":
      return {...state, bagOpen:true, panelOpen:false, justAddedToBag:false};
    case "CLOSE_BAG":
      return {...state, bagOpen:false};
    case "CLEAR_JUST_ADDED":
      return {...state, justAddedToBag:false};

    case "SET_UPLOADED_PHOTO":
      return {...state, uploadedPhoto: action.value, uploadedPhotoUrl: action.url||null, uploadedPhotoName: action.name||null};

    case "RESET_BRIEF":
      return {...state, chat:[], selectedVisual:null, bodyShape:null, colorDir:null, panelStage:"clear"};

    case "TOGGLE_SEARCH":
      return {...state, searchOpen: action.value !== undefined ? action.value : !state.searchOpen, accountOpen:false};
    case "TOGGLE_ACCOUNT":
      return {...state, accountOpen: action.value !== undefined ? action.value : !state.accountOpen, searchOpen:false};
    case "SET_NAV":
      return {...state, activeNav: action.value};
    case "SHOW_TOAST":
      return {...state, toast:{id: action.id, text: action.text}};
    case "CLEAR_TOAST":
      return {...state, toast: state.toast && state.toast.id === action.id ? null : state.toast};
    case "TOGGLE_SAVE_LOOK": {
      const savedLooks = {...state.savedLooks};
      if(savedLooks[action.lookId]) delete savedLooks[action.lookId];
      else savedLooks[action.lookId] = true;
      return {...state, savedLooks};
    }

    default:
      return state;
  }
}

function createStore(reducerFn, initState){
  let state = initState;
  const listeners = [];
  return {
    getState(){ return state; },
    dispatch(action){
      state = reducerFn(state, action);
      listeners.forEach(fn => fn(state));
      return action;
    },
    subscribe(fn){ listeners.push(fn); return () => { const i=listeners.indexOf(fn); if(i>-1) listeners.splice(i,1); }; }
  };
}

/* ---------------------------------------------------------------------
   CHAT QUEUE — replaces the old ad-hoc setTimeout calls. Every scheduled
   bot step runs through one chained promise, and every pending timer id
   is tracked so it can be cancelled in bulk. This guarantees: (a) bot
   messages always resolve in the order they were queued, even if the
   customer acts again before an earlier step finished, and (b) leaving a
   flow mid-animation (closing the panel, editing the brief) cannot leave
   a stray message to land later on top of a different screen.
   --------------------------------------------------------------------- */
const chatQueue = (function(){
  let chain = Promise.resolve();
  const pending = new Set();
  function push(fn, delay){
    chain = chain.then(() => new Promise(resolve => {
      const id = setTimeout(() => {
        pending.delete(id);
        fn();
        resolve();
      }, delay);
      pending.add(id);
    }));
    return chain;
  }
  function reset(){
    pending.forEach(id => clearTimeout(id));
    pending.clear();
    chain = Promise.resolve();
  }
  return {push, reset};
})();

}

    })
  );

  const backLink = h("button", {class:"back-to-looks"}, Icon("chevron-left","icon icon-xs"), " Back to all looks");
  backLink.addEventListener("click", () => dispatch({type:"NAV_RESULTS"}));

  const itemRows = h("div", {class:"detail-item-list"},
    [blazer, {...currentTop, isSwap:true}, trousers].map(it =>
      h("div", {class:"detail-item-row"},
        Placeholder(it.img),
        h("div", {class:"dir-info"},
          h("div", {class:"dir-top-line"},
            h("div", {class:"dir-name"}, it.name),
            h("div", {class:"dir-price"}, formatVND(it.priceValue))
          ),
          h("div", {class:"dir-meta"}, h("span",null, it.color), h("span",{class:"status-dot"}, "In stock"))
        )
      )
    )
  );

  const resetBtn = h("button", {class:"btn-sm-outline", onClick: () => selectSwapTop(1)}, "Reset");
  const updateBtn = h("button", {class:"btn-sm-dark", onClick: () => { dispatch({type:"SHOW_UPDATED_BANNER"}); showToast("Look updated"); }}, "Update Look");

  return h("div", {class:"main-content"},
    h("div", {class:"page-title-row", style:{padding:"12px 32px 10px"}}, backLink),
    h("div", {class:"detail-3col"},
      h("div", {class:"detail-3col-left"},
        h("span", {class:"badge", style:{position:"static", display:"inline-block", marginBottom:"8px"}}, look.badge || "Match"),
        h("div", {class:"detail-hero"}, Placeholder(look.img))
      ),
      h("div", {class:"detail-3col-mid"},
        h("div", {class:"detail-panel-title"}, "Look 1"),
        h("div", {class:"detail-title-row"}, h("h2", null, look.name)),
        h("p", {style:{fontSize:"12.5px", color:"var(--ink-soft)", margin:"0 0 10px"}}, look.tagline, ". Interview-ready with understated polish."),
        itemRows,
        h("div", {class:"outfit-total-row"}, h("span", null, "Total price"), h("span", null, formatVND(total))),
        h("div", {class:"detail-btn-row"},
          h("button", {class:"btn-primary", onClick: addLookToBag}, "Add All to Bag"),
          h("button", {class:"btn-outline", onClick: openTryOnPanel}, "Try This Look On Me")
        ),
        h("div", {class:"section-label"}, "Swap the top"),
        h("p", {style:{fontSize:"11.5px", color:"var(--ink-soft)", margin:"0 0 8px"}}, "Change the top to match your style."),
        (() => {
          const leftBtn = h("button", {class:"swap-scroll-btn", "aria-label":"Scroll left"}, Icon("chevron-left","icon icon-sm"));
          const rightBtn = h("button", {class:"swap-scroll-btn", "aria-label":"Scroll right"}, Icon("chevron-left","icon icon-sm rotate-180"));
          const updateArrows = () => {
            const maxScroll = swapThumbs.scrollWidth - swapThumbs.clientWidth;
            leftBtn.disabled = swapThumbs.scrollLeft <= 2;
            rightBtn.disabled = swapThumbs.scrollLeft >= maxScroll - 2;
          };
          leftBtn.addEventListener("click", ()=> swapThumbs.scrollBy({left:-120, behavior:"smooth"}));
          rightBtn.addEventListener("click", ()=> swapThumbs.scrollBy({left:120, behavior:"smooth"}));
          swapThumbs.addEventListener("scroll", updateArrows);
          requestAnimationFrame(updateArrows);
          return h("div", {class:"swap-row-wrap"}, leftBtn, swapThumbs, rightBtn);
        })(),
        h("div", {class:"outfit-total-row"},
          h("span", null, "Outfit total"),
          h("div", {class:"outfit-total-price"},
            h("span", null, formatVND(total)),
            h("span", {class:"save-note-inline"}, `You save ${formatVND(savings)}`)
          )
        ),
        h("div", {class:"detail-btn-row"}, resetBtn, updateBtn)
      ),
      h("div", {class:"detail-3col-right"},
        h("div", {class:"updated-banner" + (state.updatedBanner ? " show":"")},
          Icon("check","icon icon-sm"), h("span", null, "Recommendations updated from your interaction")
        ),
        h("div", {class:"section-label", style:{marginTop:"0"}}, "3 interview looks curated for you"),
        h("p", {style:{fontSize:"11px", color:"var(--ink-soft)", margin:"0 0 10px"}}, "Refined for your preference: stronger monochrome."),
        sideList
      )
    )
  );
}

        Placeholder(look.img),

      h("div", null,
        h("div", {class:"pdp-crumb"}, `Look: ${look.name}`),
        h("span", {class:"badge", style:{position:"static", display:"inline-block"}}, look.badge || "Match"),
        h("h1", {class:"pdp-title"}, look.name),
        h("div", {class:"pdp-price"}, formatVND(lookPriceValue(look))),
        h("p", {class:"pdp-desc"}, look.tagline, ". Interview-ready with understated polish."),
        h("p", {style:{fontSize:"12px", color:"var(--ink-soft)"}}, `Balanced tailoring for a polished interview silhouette · ${items.length} pieces`),
        h("div", null, items.map(it =>
          h("div", {class:"item-row"},
            Placeholder(it.img),
            h("div", {class:"ir-info"},
              h("div", {class:"ir-top-line"},
                h("div", {class:"ir-name"}, it.name),
                h("div", {class:"ir-price"}, formatVND(it.priceValue))

              h("div", {class:"ir-meta"}, h("span",null, it.color), h("span",{class:"status-dot"}, "In stock"))

/* -------------------- Bag drawer -------------------- */
function BagDrawer(state){
  const itemTotal = state.bag.reduce((sum,row)=> sum + row.priceValue*row.qty, 0);
  const count = state.bag.reduce((n,row)=>n+row.qty,0);
  const body = state.bag.length === 0
    ? h("p", {class:"empty-bag"}, "Your shopping bag is empty.")
    : h("div", null,
        state.justAddedToBag ? h("div", {class:"success-banner"}, Icon("check","icon icon-xs"), "Complete interview look added") : null,
        state.justAddedToBag ? h("p", {class:"success-sub"}, `All ${count} items have been added to your bag.`) : null,
        ...state.bag.map(row =>
          h("div", {class:"bag-item"},
            Placeholder(row.img),
            h("div", {class:"bi-info"},
              h("div", {class:"bi-name"}, row.name),
              h("div", {class:"bi-meta"}, row.color, h("br"), "Size: XS"),
              h("div", {class:"bi-price"}, formatVND(row.priceValue)),
              h("div", {class:"qty-row"},
                h("button", {"aria-label":`Decrease quantity of ${row.name}`, onClick:()=>dispatch({type:"SET_ITEM_QTY", id:row.id, qty:row.qty-1})}, "−"),
                h("span", null, row.qty),
                h("button", {"aria-label":`Increase quantity of ${row.name}`, onClick:()=>dispatch({type:"SET_ITEM_QTY", id:row.id, qty:row.qty+1})}, "+")
              )
            )
          )
        ),
        h("div", {class:"bag-summary"},
          h("div", {class:"row"}, h("span",null,"Item total"), h("span",null, formatVND(itemTotal))),
          h("div", {class:"row"}, h("span",null,"Delivery"), h("span",null,"FREE")),
          h("div", {class:"row total"}, h("span",null,`Total (${count} items)`), h("span",null, formatVND(itemTotal))),
          h("div", {class:"save-note"}, "You're saving VND 210,000 on this look"),
          h("button", {class:"checkout-btn", onClick:()=>{ dispatch({type:"CLOSE_BAG"}); showToast("Redirecting to secure checkout…"); }}, "Checkout"),
          h("button", {class:"view-bag-btn", onClick:()=>{ dispatch({type:"CLEAR_JUST_ADDED"}); }}, "View Shopping Bag"),
          h("div", {class:"bag-help-row"}, "Need help? ", h("span",{style:{textDecoration:"none"}},"Chat with us or visit Help Centre ›"))
        )
      );
  return h("aside", {class:"bag-panel" + (state.bagOpen ? " open":""), "aria-hidden": state.bagOpen ? "false":"true", "aria-label":"Shopping bag"},
    h("div", {class:"bag-header"},
      h("h3", null, `Shopping bag (${count})`),
      h("button", {"aria-label":"Close bag", onClick:()=>dispatch({type:"CLOSE_BAG"})}, Icon("close","icon icon-sm"))
    ),
    h("div", {class:"bag-body"}, body)
  );
}

/* -------------------- Search overlay -------------------- */
function SearchOverlay(state){
  const suggestions = ["Interview blazer","Tailored trousers","Minimal knit top","AI Stylist looks","Office dresses"];
  const closeBtn = h("button", {class:"search-overlay-close", "aria-label":"Close search"}, Icon("close","icon icon-md"));
  closeBtn.addEventListener("click", closeSearch);
  const input = h("input", {type:"text", placeholder:"What are you looking for?", "aria-label":"Search products"});
  if(state.searchOpen){ requestAnimationFrame(() => input.focus()); }
  return h("div", {class:"search-overlay" + (state.searchOpen ? " open":""), "aria-hidden": state.searchOpen ? "false":"true"},
    h("div", {class:"search-overlay-inner"},
      closeBtn,
      input,
      h("div", {class:"search-suggest"},
        suggestions.map(s => {
          const row = h("div", {class:"row"}, h("span",null,s), Icon("chevron-left","icon icon-xs"));
          row.addEventListener("click", () => { closeSearch(); showToast(`Search "${s}" — results coming soon`); });
          return row;
        })
      )
    )
  );
}

/* -------------------- Toast -------------------- */
function Toast(state){
  return h("div", {class:"toast" + (state.toast ? " show":""), role:"status", "aria-live":"polite"},
    Icon("check","icon icon-xs"), h("span", null, state.toast ? state.toast.text : "")
  );
}

/* -------------------- Root orchestrator -------------------- */
function PageContent(state){
  switch(state.page){
    case "home": return HomePage(state);
    case "results": return ResultsPage(state);
    case "detail": return DetailPage(state);
    case "pdp": return PdpPage(state);
    case "tryonResult": return TryOnResultPage(state);
    default: return HomePage(state);
  }
}

function render(state){
  const root = document.getElementById("root");
  // Reuse the same scroll container node across renders instead of creating
  // a brand-new one each time. Swapping the *node* (even with scrollTop
  // restored afterwards) forces the browser to drop it and reflow/repaint
  // the whole scroll region, which is what produced the visible "jump".
  // Keeping the same DOM node and just replacing its content preserves
  // scroll position natively with zero flicker.
  let mainScroll = document.getElementById("mainColScroll");
  if(!mainScroll){
    mainScroll = h("div", {class:"main-col-scroll", id:"mainColScroll"});
  }
  mount(mainScroll, PageContent(state));

  const app = h("div", {class:"app"},
    h("div", {class:"main-col"}, Header(state), mainScroll),
    FAB(state),
    h("div", {class:"panel-overlay" + (state.panelOpen ? " open":""), onClick: closeStylistPanel}),
    h("div", {class:"stylist-dock" + (state.panelOpen ? " open":"")}, StylistPanel(state)),
    h("div", {class:"bag-overlay" + (state.bagOpen ? " open":""), onClick:()=>dispatch({type:"CLOSE_BAG"})}),
    h("div", {class:"bag-dock" + (state.bagOpen ? " open":"")}, BagDrawer(state)),
    SearchOverlay(state),
    Toast(state)
  );
  mount(root, app);
}

let _lastPage = store.getState().page;
let _lastChatLen = store.getState().chat.length;
let _lastDetailChatLen = store.getState().detailChat.length;
store.subscribe((state) => {
  // The whole app tree is torn down and rebuilt on every single dispatch
  // (see mount()/clear() above), so every scrollable element — the main
  // content column, the chat panel, the bag — is a brand new DOM node
  // each time and would otherwise reset to scrollTop 0. That's what made
  // every button press look like it "jumped back to the top". We record
  // where the user was scrolled to right before the rebuild, then put
  // each container back where it was afterwards.
  const mainScrollerBefore = document.getElementById("mainColScroll");
  const panelBodyBefore = document.querySelector(".panel-body");
  const bagBodyBefore = document.querySelector(".bag-body");
  const prevMainScrollTop = mainScrollerBefore ? mainScrollerBefore.scrollTop : 0;
  const prevPanelScrollTop = panelBodyBefore ? panelBodyBefore.scrollTop : 0;
  const prevBagScrollTop = bagBodyBefore ? bagBodyBefore.scrollTop : 0;
  const chatGrew = state.chat.length > _lastChatLen || state.detailChat.length > _lastDetailChatLen;
  _lastChatLen = state.chat.length;
  _lastDetailChatLen = state.detailChat.length;

  render(state);

  const mainScrollerAfter = document.getElementById("mainColScroll");
  if(state.page !== _lastPage){
    _lastPage = state.page;
    if(mainScrollerAfter) mainScrollerAfter.scrollTop = 0;
  } else if(mainScrollerAfter){
    mainScrollerAfter.scrollTop = prevMainScrollTop;
  }

  const panelBodyAfter = document.querySelector(".panel-body");
  if(panelBodyAfter){
    // A new chat/bot message just landed — follow the conversation down
    // to the newest line. Otherwise (e.g. picking a swatch, toggling a
    // chip) keep the reader exactly where they were scrolled to.
    panelBodyAfter.scrollTop = chatGrew ? panelBodyAfter.scrollHeight : prevPanelScrollTop;
  }
  const bagBodyAfter = document.querySelector(".bag-body");
  if(bagBodyAfter) bagBodyAfter.scrollTop = prevBagScrollTop;
});
render(store.getState());
</script>
